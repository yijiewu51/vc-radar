<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>VC Radar - Step 1</title>
<link rel="stylesheet" href="notion.css">
<style>
  /* Chrome mock */
  .browser {
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .browser-bar {
    background: var(--bg-block);
    padding: 9px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }

  .b-dots { display: flex; gap: 5px; }
  .b-dot { width: 8px; height: 8px; border-radius: 50%; opacity: 0.55; }
  .bd1 { background: #FF5F57; } .bd2 { background: #FEBC2E; } .bd3 { background: #28C840; }

  .b-url {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 3px 12px;
    font-size: 11px;
    color: var(--text-3);
    font-family: 'Inter', monospace;
  }

  .ext-page { padding: 16px; background: var(--bg-card); }

  .ext-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .ext-title { font-size: 14px; font-weight: 700; color: var(--text-1); }

  .dev-toggle {
    display: flex; align-items: center; gap: 8px;
    font-size: 11.5px; color: var(--text-2); font-weight: 500;
  }

  .toggle {
    width: 30px; height: 17px;
    background: var(--accent);
    border-radius: 9px;
    position: relative;
  }

  .toggle::after {
    content: '';
    position: absolute;
    right: 2px; top: 2px;
    width: 13px; height: 13px;
    background: #fff;
    border-radius: 50%;
  }

  .load-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--bg-block);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-1);
    margin-bottom: 12px;
  }

  .ext-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--bg-block);
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  .ext-icon {
    width: 32px; height: 32px;
    background: var(--text-1);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }

  .ext-name { font-size: 12.5px; font-weight: 600; color: var(--text-1); }
  .ext-status { font-size: 11px; color: #16A34A; margin-top: 2px; font-weight: 500; }

  .ext-on {
    margin-left: auto;
    width: 30px; height: 17px;
    background: #16A34A;
    border-radius: 9px;
    position: relative;
    flex-shrink: 0;
  }

  .ext-on::after {
    content: '';
    position: absolute;
    right: 2px; top: 2px;
    width: 13px; height: 13px;
    background: #fff;
    border-radius: 50%;
  }

  /* Config */
  .config-row { margin-bottom: 16px; }
  .config-row:last-child { margin-bottom: 0; }

  .config-label {
    font-size: 12px; font-weight: 600;
    color: var(--text-1);
    margin-bottom: 6px;
    display: flex; align-items: center; gap: 5px;
  }

  .config-input {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 12px;
    color: var(--text-3);
    font-family: 'Inter', monospace;
    display: flex; align-items: center; gap: 8px;
  }

  .mask { display: flex; gap: 2px; }
  .mask span { width: 5px; height: 5px; background: var(--text-3); border-radius: 50%; opacity: 0.4; }

  .config-hint { font-size: 11px; color: var(--text-3); margin-top: 5px; line-height: 1.5; }
</style>
</head>
<body>
<div class="card">

  <div class="step-badge">
    <div class="num">1</div>
    安装 & 配置
  </div>

  <h1>一次配置，<br><span class="accent">永久使用</span></h1>
  <p class="subtitle">手动加载插件 + 填写两个 Key，5 分钟搞定</p>

  <div class="browser">
    <div class="browser-bar">
      <div class="b-dots">
        <div class="b-dot bd1"></div>
        <div class="b-dot bd2"></div>
        <div class="b-dot bd3"></div>
      </div>
      <div class="b-url">chrome://extensions</div>
    </div>
    <div class="ext-page">
      <div class="ext-header">
        <div class="ext-title">扩展程序</div>
        <div class="dev-toggle">开发者模式 <div class="toggle"></div></div>
      </div>
      <div class="load-btn">📁 加载已解压的扩展程序</div>
      <div class="ext-item">
        <div class="ext-icon">📡</div>
        <div>
          <div class="ext-name">VC Radar</div>
          <div class="ext-status">● 已启用</div>
        </div>
        <div class="ext-on"></div>
      </div>
    </div>
  </div>

  <div class="section-label">填写 API Keys</div>
  <div class="block">
    <div class="config-row">
      <div class="config-label">✨ Anthropic API Key</div>
      <div class="config-input">
        <div class="mask">
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        sk-ant-••••••
      </div>
      <div class="config-hint">前往 console.anthropic.com 获取</div>
    </div>
    <div class="config-row">
      <div class="config-label">📌 Notion Token & Database ID</div>
      <div class="config-input">
        <div class="mask">
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span>
        </div>
        secret_••••••
      </div>
      <div class="config-hint">notion.so/my-integrations → 新建集成 → 复制 Token</div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="footer">
    <div class="footer-brand">
      <div class="f-logo">📡</div>
      <div>
        <div class="f-name">VC Radar</div>
        <div class="f-sub">免费开源 · GitHub 获取</div>
      </div>
    </div>
    <div class="page-dots">
      <span></span>
      <span></span>
      <span class="active"></span>
      <span></span>
      <span></span>
    </div>
  </div>

</div>
</body>
</html>
