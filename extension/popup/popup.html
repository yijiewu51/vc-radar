<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #37352f;
      padding: 18px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid #edece9;
    }

    .header-icon {
      width: 30px; height: 30px;
      background: #18181b;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
    }

    .header-title { font-size: 14px; font-weight: 700; color: #37352f; }
    .header-sub   { font-size: 11px; color: #acaba8; margin-top: 1px; }

    .section-label {
      font-size: 10px; font-weight: 600;
      color: #acaba8; letter-spacing: 0.8px;
      text-transform: uppercase; margin-bottom: 10px;
    }

    .section { margin-bottom: 16px; }

    label {
      display: block; font-size: 12px; font-weight: 500;
      color: #37352f; margin-bottom: 4px; margin-top: 9px;
    }

    label:first-of-type { margin-top: 0; }

    input {
      width: 100%;
      background: #f7f6f3;
      border: 1px solid #edece9;
      border-radius: 7px;
      color: #37352f;
      font-size: 12px;
      font-family: -apple-system, monospace;
      padding: 7px 9px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #4f46e5; background: #fff; }

    .hint { font-size: 10.5px; color: #acaba8; margin-top: 3px; line-height: 1.45; }

    /* Provider toggle */
    .provider-row {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 6px; margin-bottom: 11px;
    }

    .p-btn {
      padding: 8px 6px; border-radius: 8px;
      border: 1.5px solid #edece9;
      background: #f7f6f3;
      cursor: pointer; text-align: center;
      transition: all 0.12s;
    }

    .p-btn.active { border-color: #4f46e5; background: #eeecfb; }

    .p-btn .p-name { font-size: 12.5px; font-weight: 600; color: #37352f; }
    .p-btn.active .p-name { color: #4f46e5; }
    .p-btn .p-sub  { font-size: 10px; color: #acaba8; margin-top: 1px; }
    .p-btn.active .p-sub { color: #6366f1; }

    .key-section { display: none; }
    .key-section.visible { display: block; }

    .divider { border: none; border-top: 1px solid #edece9; margin: 14px 0; }

    #save {
      width: 100%; margin-top: 2px;
      padding: 9px; background: #37352f;
      color: white; border: none;
      border-radius: 8px; font-size: 13px;
      font-weight: 600; cursor: pointer;
      font-family: -apple-system, sans-serif;
      transition: background 0.12s;
    }

    #save:hover { background: #111; }

    #status { margin-top: 8px; font-size: 12px; text-align: center; min-height: 15px; }
    .ok  { color: #16a34a; }
    .err { color: #dc2626; }

    .tip {
      font-size: 11px; color: #acaba8;
      line-height: 1.55; margin-top: 13px;
      padding-top: 13px; border-top: 1px solid #edece9;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">📡</div>
    <div>
      <div class="header-title">VC Radar</div>
      <div class="header-sub">LinkedIn · Boss直聘</div>
    </div>
  </div>

  <!-- Notion -->
  <div class="section">
    <div class="section-label">Notion 配置</div>
    <label>Integration Token</label>
    <input id="token" type="password" placeholder="ntn_xxx 或 secret_xxx" />
    <label>Database ID</label>
    <input id="dbId" type="text" placeholder="32 位 Database ID" />
    <div class="hint">前往 notion.so/my-integrations 新建集成获取 Token</div>
  </div>

  <div class="divider"></div>

  <!-- AI Provider -->
  <div class="section">
    <div class="section-label">AI 提供商（用于 🔍 公司研究）</div>
    <div class="provider-row">
      <div class="p-btn active" onclick="selectProvider('anthropic')">
        <div class="p-name">Anthropic</div>
        <div class="p-sub">Claude · 国际</div>
      </div>
      <div class="p-btn" onclick="selectProvider('deepseek')">
        <div class="p-name">DeepSeek</div>
        <div class="p-sub">国内可用</div>
      </div>
    </div>

    <div id="anthropic-section" class="key-section visible">
      <input id="anthropicKey" type="password" placeholder="sk-ant-xxx" />
      <div class="hint">console.anthropic.com 获取</div>
    </div>

    <div id="deepseek-section" class="key-section">
      <input id="deepseekKey" type="password" placeholder="sk-xxx" />
      <div class="hint">platform.deepseek.com 获取，国内直接可用</div>
    </div>
  </div>

  <button id="save">保存设置</button>
  <div id="status"></div>

  <p class="tip">📌 点击职位旁角标 → 保存到 Notion &nbsp;·&nbsp; 🔍 悬停公司名 → AI 研究</p>

  <script src="popup.js"></script>
</body>
</html>
